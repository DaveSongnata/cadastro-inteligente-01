<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Inteligente - TechConnect</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="form-container">
        <h2>Criar Conta</h2>
        <form id="cadastroForm" novalidate>
            <div class="form-group">
                <label for="nome">Nome Completo *</label>
                <input type="text" id="nome" name="nome" placeholder="Seu nome completo" required minlength="3" autocomplete="name">
                <span class="error-msg" id="nome-error"></span>
            </div>
            
            <div class="form-group">
                <label for="email">E-mail *</label>
                <input type="email" id="email" name="email" placeholder="seu@email.com" required autocomplete="email">
                <span class="error-msg" id="email-error"></span>
            </div>
            
            <div class="form-group">
                <label for="senha">Senha *</label>
                <input type="password" id="senha" name="senha" placeholder="Mínimo 8 caracteres" required minlength="8" autocomplete="new-password">
                <div class="password-strength">
                    <div id="strength-bar" class="strength-bar"></div>
                </div>
                <span class="error-msg" id="senha-error"></span>
            </div>

            <div class="form-group">
                <label for="confirmarSenha">Confirmar Senha *</label>
                <input type="password" id="confirmarSenha" name="confirmarSenha" placeholder="Repita sua senha" required minlength="8" autocomplete="new-password">
                <span class="error-msg" id="confirmarSenha-error"></span>
            </div>

            <div id="success-msg" class="success-alert" style="display: none;"></div>

            <button type="submit" id="submitBtn">
                <span id="btn-text">Criar Conta</span>
                <span id="btn-spinner" class="spinner" style="display: none;"></span>
            </button>
        </form>
    </div>
    <script src="js/application.js"></script>
</body>
</html>
